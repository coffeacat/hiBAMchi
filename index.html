				<div id="timerContainer">
					<p id="timer" class="prevent-select">0:00</p>
				</div>
				<div id="scoreContainer" class="container prevent-select">
					<p id="scoreLabel" class="label prevent-select">SCORE</p>
					<p id="score" class="prevent-select">0</p>
				</div>
				<div id="comboContainer" class="container prevent-select">
					<p id="comboLabel" class="label prevent-select">COMBO</p>
					<p id="combo" class="prevent-select">x0</p>
				</div>
				
				<button id="settingsButton">
				</button>
				<!--<button id="infoButton">

				<div id="menuOverlay" class="overlay prevent-select"></div>
				<div id="menu" class="prevent-select">
					<svg id="menuExit" onclick="closeMenu()">
						<image class="svgImage" href="./public/images/ui/cross.svg" />
					</svg>
					<div id="menuLabel" class="prevent-select">SOUND MENU</div>
					<div id="bgm" class="sliderContainer">
						<div class="sliderLabel prevent-select">BGM</div>
						<svg class="muteSpeaker">
							<image id="bgmSpeaker" class="svgImage" href="./public/images/ui/volume.svg" />
						</svg>
						<div class="slider">
							<input id="bgmInput" type="range" min="0" max="100" value="50">
							<progress id="bgmBar" min="0" max="100" value="50"></progress>
						</div>
						<div id="bgmValue" class="sliderValue prevent-select">100</div>
					</div>
					<div id="sfx" class="sliderContainer">
						<div class="sliderLabel prevent-select">SFX</div>
						<svg class="muteSpeaker">
							<image id="sfxSpeaker" class="svgImage" href="./public/images/ui/volume.svg" />
						</svg>
						<div class="slider">
							<input id="sfxInput" type="range" min="0" max="100" value="100">
							<progress id="sfxBar" min="0" max="100" value="100"></progress>
						</div>
						<div id="sfxValue" class="sliderValue prevent-select">100</div>
					</div>
